<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고양이 계산기</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'맑은 고딕',sans-serif;
}

body{
    background:#dff6df;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    width:360px;
    background:#ecfff0;
    border-radius:30px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    border:4px solid #9fd39f;
    position:relative;
}

/* 고양이 귀 */
.calculator::before,
.calculator::after{
    content:"";
    position:absolute;
    width:70px;
    height:70px;
    background:#ecfff0;
    border:4px solid #9fd39f;
    top:-32px;
    z-index:-1;
    transform:rotate(45deg);
}

.calculator::before{
    left:40px;
}

.calculator::after{
    right:40px;
}

h1{
    text-align:center;
    color:#4f7d4f;
    margin-bottom:15px;
    font-size:30px;
}

.display{
    width:100%;
    height:70px;
    border:none;
    border-radius:18px;
    background:white;
    text-align:right;
    padding:15px;
    font-size:30px;
    color:#333;
    margin-bottom:20px;
    box-shadow:inset 0 0 8px rgba(0,0,0,.1);
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

button{
    height:65px;
    border:none;
    border-radius:18px;
    font-size:24px;
    cursor:pointer;
    transition:.2s;
    background:#ffffff;
    box-shadow:0 4px 8px rgba(0,0,0,.12);
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#ffffff;
}

.operator{
    background:#b8e8b8;
    color:#2f662f;
    font-weight:bold;
}

.equal{
    background:#79d279;
    color:white;
}

.clear{
    background:#ffb8b8;
}

.footer{
    text-align:center;
    margin-top:18px;
    color:#4f7d4f;
    font-weight:bold;
    font-size:18px;
}

.cat{
    text-align:center;
    font-size:26px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="calculator">

<div class="cat">🐱</div>

<h1>계산기</h1>

<input type="text" class="display" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="append('%')">%</button>
<button class="operator" onclick="backspace()">⌫</button>
<button class="operator" onclick="append('/')">÷</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">＋</button>

<button class="number" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

<div class="footer">
🐾 K J S 🐾
</div>

</div>

<script>
const display=document.getElementById("display");

function append(value){
    display.value+=value;
}

function clearDisplay(){
    display.value="";
}

function backspace(){
    display.value=display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value=eval(display.value);
    }catch{
        display.value="Error";
    }
}
</script>

</body>
</html>
