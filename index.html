<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고양이 계산기</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"맑은 고딕",sans-serif;
}

body{
    background:#dff7dc;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:15px;
}

.calculator{

    width:100%;
    max-width:420px;

    background:#f9fff8;
    border-radius:35px;
    padding:20px;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
    position:relative;
}

/* 고양이 귀 */

.calculator:before,
.calculator:after{

content:"";
position:absolute;
width:55px;
height:55px;
background:#f9fff8;
top:-18px;
transform:rotate(45deg);

}

.calculator:before{
left:45px;
border-radius:8px;
}

.calculator:after{
right:45px;
border-radius:8px;
}

.title{

text-align:center;
font-size:30px;
font-weight:bold;
margin-bottom:15px;
color:#444;

}

/* 고양이 얼굴 */

.face{

text-align:center;
font-size:30px;
margin-bottom:10px;

}

.display{

width:100%;
height:90px;
border:none;
border-radius:20px;
background:white;
font-size:28px;
padding:15px;
text-align:right;
outline:none;
margin-bottom:15px;
overflow:auto;

}

.buttons{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;

}

button{

height:65px;
border:none;
border-radius:18px;
font-size:23px;
cursor:pointer;
background:#ffffff;
transition:.2s;

}

button:hover{

transform:scale(1.05);

}

.number{

background:#fff;

}

.operator{

background:#ffd8b2;

}

.equal{

background:#ffb3c7;

}

.clear{

background:#ff8c8c;
color:white;

}

.fraction{

background:#a9e6b1;

}

.footer{

margin-top:15px;
text-align:center;
font-size:20px;
font-weight:bold;
color:#666;

}

@media(max-width:450px){

.title{

font-size:26px;

}

button{

height:60px;
font-size:22px;

}

.display{

font-size:25px;

}

}

</style>
</head>

<body>

<div class="calculator">

<div class="title">계산기</div>

<div class="face">
🐱
</div>

<input class="display" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button onclick="backspace()">←</button>
<button class="fraction" onclick="insertFraction()">a/b</button>
<button class="operator" onclick="press('/')">÷</button>

<button class="number" onclick="press('7')">7</button>
<button class="number" onclick="press('8')">8</button>
<button class="number" onclick="press('9')">9</button>
<button class="operator" onclick="press('*')">×</button>

<button class="number" onclick="press('4')">4</button>
<button class="number" onclick="press('5')">5</button>
<button class="number" onclick="press('6')">6</button>
<button class="operator" onclick="press('-')">-</button>

<button class="number" onclick="press('1')">1</button>
<button class="number" onclick="press('2')">2</button>
<button class="number" onclick="press('3')">3</button>
<button class="operator" onclick="press('+')">+</button>

<button onclick="press('(')">(</button>
<button class="number" onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="press(')')">)</button>

<button class="equal" style="grid-column:span 4;" onclick="calculate()">= 🐾</button>

</div>

<div class="footer">
K J S
</div>

</div>

<script>

const display=document.getElementById("display");

function press(v){

display.value+=v;

}

function clearDisplay(){

display.value="";

}

function backspace(){

display.value=display.value.slice(0,-1);

}

function insertFraction(){

display.value+="/";

}

class Fraction{

constructor(n,d){

if(d==0) throw "0으로 나눌 수 없습니다.";

if(d<0){

n=-n;
d=-d;

}

const g=this.gcd(Math.abs(n),Math.abs(d));

this.n=n/g;
this.d=d/g;

}

gcd(a,b){

while(b){

[a,b]=[b,a%b];

}

return a||1;

}

add(f){

return new Fraction(this.n*f.d+f.n*this.d,this.d*f.d);

}

sub(f){

return new Fraction(this.n*f.d-f.n*this.d,this.d*f.d);

}

mul(f){

return new Fraction(this.n*f.n,this.d*f.d);

}

div(f){

return new Fraction(this.n*f.d,this.d*f.n);

}

toString(){

if(this.d==1) return ""+this.n;

return this.n+"/"+this.d;

}

}

function parseNumber(str){

if(str.includes('/')){

let p=str.split('/');

return new Fraction(Number(p[0]),Number(p[1]));

}

if(str.includes('.')){

let s=str;

let dec=s.split('.')[1].length;

let den=Math.pow(10,dec);

let num=Math.round(Number(s)*den);

return new Fraction(num,den);

}

return new Fraction(Number(str),1);

}

function tokenize(exp){

return exp.match(/\d+\/\d+|\d+\.\d+|\d+|[()+\-*/]/g);

}

function precedence(op){

if(op=="+"||op=="-") return 1;

if(op=="*"||op=="/") return 2;

return 0;

}

function apply(a,b,op){

switch(op){

case '+':return a.add(b);
case '-':return a.sub(b);
case '*':return a.mul(b);
case '/':return a.div(b);

}

}

function evaluate(expression){

let tokens=tokenize(expression);

let values=[];
let ops=[];

for(let t of tokens){

if(!isNaN(t[0])){

values.push(parseNumber(t));

}

else if(t=="("){

ops.push(t);

}

else if(t==")"){

while(ops.length&&ops.at(-1)!="("){

let op=ops.pop();
let b=values.pop();
let a=values.pop();

values.push(apply(a,b,op));

}

ops.pop();

}

else{

while(ops.length&&precedence(ops.at(-1))>=precedence(t)){

let op=ops.pop();
let b=values.pop();
let a=values.pop();

values.push(apply(a,b,op));

}

ops.push(t);

}

}

while(ops.length){

let op=ops.pop();
let b=values.pop();
let a=values.pop();

values.push(apply(a,b,op));

}

return values[0];

}

function calculate(){

try{

let result=evaluate(display.value);

display.value=result.toString();

}catch(e){

display.value="Error";

}

}

</script>

</body>
</html>
