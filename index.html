<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>귀여운 고양이 계산기</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"맑은 고딕",sans-serif;
}

body{
background:#dff7d8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.calculator{
width:100%;
max-width:430px;
background:#efffe9;
border-radius:30px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
border:4px solid #8ecf93;
position:relative;
}

.cat-ear-left,
.cat-ear-right{
position:absolute;
top:-20px;
width:45px;
height:45px;
background:#8ecf93;
transform:rotate(45deg);
}

.cat-ear-left{
left:50px;
border-radius:8px;
}

.cat-ear-right{
right:50px;
border-radius:8px;
}

.title{
text-align:center;
font-size:30px;
font-weight:bold;
color:#4d7b55;
margin-bottom:15px;
}

.history{
height:35px;
background:#fff;
border-radius:10px;
padding:8px;
font-size:15px;
overflow-x:auto;
color:#666;
margin-bottom:8px;
}

.display{
height:60px;
background:white;
border-radius:15px;
font-size:28px;
padding:12px;
text-align:right;
overflow-x:auto;
margin-bottom:15px;
font-weight:bold;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
height:65px;
border:none;
border-radius:18px;
font-size:24px;
cursor:pointer;
background:#bde9b9;
transition:.2s;
font-weight:bold;
}

button:hover{
background:#9ed79b;
transform:scale(.96);
}

.operator{
background:#ffd66e;
}

.equal{
background:#ff9f8f;
grid-column:span 2;
}

.clear{
background:#ff8080;
color:white;
}

.footer{
margin-top:20px;
text-align:center;
font-size:18px;
font-weight:bold;
color:#4d7b55;
}

.cat{
text-align:center;
font-size:32px;
margin-bottom:5px;
}

@media(max-width:500px){

.calculator{
border-radius:0;
min-height:100vh;
max-width:100%;
padding:15px;
}

button{
height:60px;
font-size:22px;
}

.display{
font-size:24px;
}

}
</style>
</head>

<body>

<div class="calculator">

<div class="cat-ear-left"></div>
<div class="cat-ear-right"></div>

<div class="cat">🐱</div>

<div class="title">계산기</div>

<div id="history" class="history"></div>

<div id="display" class="display">0</div>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button onclick="backspace()">⌫</button>
<button onclick="insertFraction()">a/b</button>
<button class="operator" onclick="press('/')">÷</button>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button class="operator" onclick="press('*')">×</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button class="operator" onclick="press('-')">−</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button class="operator" onclick="press('+')">+</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

<div class="footer">K J S</div>

</div>

<script>

let expression="";

function press(value){

expression+=value;
update();

}

function update(){

document.getElementById("display").innerHTML=
expression==""?"0":expression;

}

function clearDisplay(){

expression="";
document.getElementById("history").innerHTML="";
update();

}

function backspace(){

expression=expression.slice(0,-1);
update();

}

function insertFraction(){

expression+="/";
update();

}

function gcd(a,b){

return b?gcd(b,a%b):a;

}

function decimalToFraction(x){

if(Number.isInteger(x))
return x.toString();

let str=x.toString();

if(str.includes("e"))
return x;

let digits=str.split(".")[1].length;

let denominator=Math.pow(10,digits);

let numerator=Math.round(x*denominator);

let g=gcd(Math.abs(numerator),denominator);

return (numerator/g)+"/"+(denominator/g);

}

function calculate(){

try{

document.getElementById("history").innerHTML=expression+" =";

let result=Function("return "+expression)();

document.getElementById("display").innerHTML=
decimalToFraction(result);

expression=result.toString();

}catch{

document.getElementById("display").innerHTML="오류";

expression="";

}

}

update();

</script>

</body>
</html>
