<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계산기</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"맑은 고딕",sans-serif;
}

body{
background:#f2f2f2;
display:flex;
justify-content:center;
padding:20px;
}

.calculator{
width:100%;
max-width:420px;
background:white;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
padding:20px;
}

h1{
text-align:center;
margin-bottom:15px;
font-size:32px;
}

.history{
height:120px;
overflow:auto;
border:1px solid #ddd;
border-radius:10px;
padding:10px;
margin-bottom:10px;
background:#fafafa;
font-size:18px;
}

.display{
width:100%;
height:65px;
font-size:30px;
text-align:right;
padding:10px;
border:2px solid #999;
border-radius:10px;
margin-bottom:15px;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
height:70px;
font-size:26px;
border:none;
border-radius:12px;
background:#ececec;
cursor:pointer;
}

button:hover{
background:#ddd;
}

.operator{
background:#ffb347;
}

.equal{
background:#4caf50;
color:white;
}

.clear{
background:#f44336;
color:white;
}

.fraction{
background:#6fa8dc;
color:white;
}

@media(max-width:500px){

button{
height:65px;
font-size:24px;
}

.display{
font-size:26px;
}

.history{
font-size:16px;
}

}
</style>
</head>

<body>

<div class="calculator">

<h1>계산기</h1>

<div class="history" id="history"></div>

<input class="display" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button onclick="backspace()">←</button>
<button class="fraction" onclick="insert('/')">분수 /</button>
<button class="operator" onclick="insert('÷')">÷</button>

<button onclick="insert('7')">7</button>
<button onclick="insert('8')">8</button>
<button onclick="insert('9')">9</button>
<button class="operator" onclick="insert('×')">×</button>

<button onclick="insert('4')">4</button>
<button onclick="insert('5')">5</button>
<button onclick="insert('6')">6</button>
<button class="operator" onclick="insert('-')">-</button>

<button onclick="insert('1')">1</button>
<button onclick="insert('2')">2</button>
<button onclick="insert('3')">3</button>
<button class="operator" onclick="insert('+')">+</button>

<button onclick="insert('0')">0</button>
<button onclick="insert('(')">(</button>
<button onclick="insert(')')">)</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>

let display=document.getElementById("display");
let history=document.getElementById("history");

function insert(v){
display.value+=v;
}

function clearDisplay(){
display.value="";
}

function backspace(){
display.value=display.value.slice(0,-1);
}

// 최대공약수
function gcd(a,b){
a=Math.abs(a);
b=Math.abs(b);
while(b){
let t=b;
b=a%b;
a=t;
}
return a;
}

// 약분
function simplify(n,d){
if(d<0){
n=-n;
d=-d;
}
let g=gcd(n,d);
return {n:n/g,d:d/g};
}

// 문자열 -> 분수
function parseFraction(str){

if(str.includes("/")){
let p=str.split("/");
return simplify(parseInt(p[0]),parseInt(p[1]));
}

return {n:parseInt(str),d:1};

}

// 분수 연산
function add(a,b){
return simplify(a.n*b.d+b.n*a.d,a.d*b.d);
}

function sub(a,b){
return simplify(a.n*b.d-b.n*a.d,a.d*b.d);
}

function mul(a,b){
return simplify(a.n*b.n,a.d*b.d);
}

function div(a,b){
return simplify(a.n*b.d,a.d*b.n);
}

function format(f){
if(f.d==1)return ""+f.n;
return f.n+"/"+f.d;
}

function calculate(){

try{

let exp=display.value;

let tokens=exp.match(/\d+\/\d+|\d+|[+\-×÷]/g);

if(!tokens)return;

let result=parseFraction(tokens[0]);

for(let i=1;i<tokens.length;i+=2){

let op=tokens[i];
let num=parseFraction(tokens[i+1]);

if(op=="+") result=add(result,num);

if(op=="-") result=sub(result,num);

if(op=="×") result=mul(result,num);

if(op=="÷") result=div(result,num);

}

history.innerHTML+=exp+" = <b>"+format(result)+"</b><br>";

history.scrollTop=history.scrollHeight;

display.value=format(result);

}catch(e){

display.value="오류";

}

}

</script>

</body>
</html>
