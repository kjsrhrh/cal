<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 계산기</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"맑은 고딕",sans-serif;
}

body{
    background:#DDF6D2;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:15px;
}

.calculator{
    width:100%;
    max-width:420px;
    background:#F9FFF9;
    border-radius:30px;
    padding:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    border:5px solid #90D890;
    position:relative;
}

.calculator::before,
.calculator::after{
    content:"";
    position:absolute;
    width:55px;
    height:55px;
    background:#90D890;
    top:-25px;
    transform:rotate(45deg);
    border-radius:10px;
}

.calculator::before{
    left:60px;
}

.calculator::after{
    right:60px;
}

.title{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    color:#4E8A4E;
    margin-top:8px;
    margin-bottom:15px;
}

.history{
    width:100%;
    height:120px;
    background:#EEF9EE;
    border:2px dashed #9CCF9C;
    border-radius:15px;
    overflow-y:auto;
    overflow-x:auto;
    white-space:nowrap;
    padding:10px;
    font-size:15px;
    color:#444;
    margin-bottom:12px;
    scrollbar-width:thin;
}

.display{
    width:100%;
    height:60px;
    border:none;
    border-radius:15px;
    background:white;
    padding:10px;
    font-size:clamp(22px,5vw,30px);
    text-align:right;
    outline:none;
    margin-bottom:15px;
    overflow-x:auto;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:18px;
    font-size:24px;
    cursor:pointer;
    transition:.2s;
    box-shadow:0 4px 8px rgba(0,0,0,.15);
}

button:hover{
    transform:scale(1.05);
}

button:active{
    transform:scale(.95);
}

.number{
    background:#fff;
}

.operator{
    background:#FFD889;
}

.equal{
    background:#7FD67F;
    color:#fff;
}

.clear{
    background:#FF8E8E;
    color:#fff;
}

.zero{
    grid-column:span 2;
}

.footer{
    text-align:center;
    margin-top:18px;
    color:#4E8A4E;
    font-weight:bold;
    font-size:20px;
}

.footer::before{
    content:"🐾 ";
}

.footer::after{
    content:" 🐾";
}

@media(max-width:480px){

.title{
    font-size:26px;
}

.display{
    height:55px;
}

.history{
    height:110px;
}

button{
    height:58px;
    font-size:22px;
}

.calculator::before{
    left:40px;
}

.calculator::after{
    right:40px;
}

}
</style>

</head>
<body>

<div class="calculator">

<div class="title">🐱 계산기 🐱</div>

<div id="history" class="history"></div>

<input type="text" id="display" class="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearAll()">C</button>
<button onclick="backspace()">⌫</button>
<button class="operator" onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">÷</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button class="number zero" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

<div class="footer">K J S</div>

</div>

<script>

const display=document.getElementById("display");
const history=document.getElementById("history");

loadHistory();

function append(value){

    const operators=["+","-","*","/","%"];
    const last=display.value.slice(-1);

    if(operators.includes(last)&&operators.includes(value)){
        return;
    }

    if(value==="."){
        const parts=display.value.split(/[+\-*/%]/);
        if(parts[parts.length-1].includes(".")){
            return;
        }
    }

    display.value+=value;
}

function backspace(){
    display.value=display.value.slice(0,-1);
}

function clearAll(){

    if(confirm("계산 기록도 모두 삭제할까요?")){
        history.innerHTML="";
        localStorage.removeItem("catHistory");
    }

    display.value="";
}

function calculate(){

    if(display.value==="") return;

    if(/[+\-*/.%]$/.test(display.value)){
        alert("계산식을 확인하세요.");
        return;
    }

    try{

        const expression=display.value;

        const result=parseFloat(Function('"use strict";return ('+expression+')')().toFixed(10));

        const div=document.createElement("div");

        div.innerHTML=
        expression.replace(/\*/g,"×").replace(/\//g,"÷")
        +" = <b>"+result+"</b>";

        history.appendChild(div);

        history.scrollTop=history.scrollHeight;

        display.value=result;

        saveHistory();

    }catch{

        alert("잘못된 계산식입니다.");

    }

}

function saveHistory(){
    localStorage.setItem("catHistory",history.innerHTML);
}

function loadHistory(){
    const data=localStorage.getItem("catHistory");
    if(data){
        history.innerHTML=data;
        history.scrollTop=history.scrollHeight;
    }
}

document.addEventListener("keydown",(e)=>{

    if(["Backspace","Enter","Escape"].includes(e.key)){
        e.preventDefault();
    }

    if((e.key>="0"&&e.key<="9")||
       ["+","-","*","/",".","%"].includes(e.key)){
        append(e.key);
    }

    if(e.key==="Enter"){
        calculate();
    }

    if(e.key==="Backspace"){
        backspace();
    }

    if(e.key==="Escape"){
        clearAll();
    }

});

</script>

</body>
</html>
